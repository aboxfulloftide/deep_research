use_default_settings: true

server:
  secret_key: "deep-research-searxng-key-change-me"
  bind_address: "0.0.0.0"
  port: 8080

search:
  formats:
    - html
    - json

engines:
  - name: brave
    disabled: true
  - name: brave.images
    disabled: true
  - name: brave.videos
    disabled: true
  - name: brave.news
    disabled: true
  - name: brave.goggles
    disabled: true
  # Kept out of the default fan-out. Verification explicitly opts these two
  # into SearXNG only for an LLM-generated alternate query, never for the
  # literal claim or an ordinary interactive search.
  - name: google cse
    disabled: true
  - name: google cse images
    disabled: true
  - name: startpage
    disabled: true
  - name: startpage news
    disabled: true
  - name: startpage images
    disabled: true
  - name: mojeek
    disabled: false
  - name: bing
    disabled: false
  # Permanently retired from the SearXNG fan-out. Wikidata failed on 46/46
  # logged calls (timeouts + "too many requests",
  # each timeout stalling the whole SearXNG response); wikipedia failed 8/8.
  # Both are replaced by direct calls to their own public APIs in
  # deep_research/tools/search.py (wikipedia_api / wikidata_api).
  - name: wikidata
    disabled: true
  - name: wikipedia
    disabled: true
