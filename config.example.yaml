llm:
  # Interactive research always uses the managed llama.cpp server.
  base_url: "http://localhost:8080/v1"
  model: ""
  api_key: "not-needed"
  backend: "llama_cpp"
  llama_cpp_base_url: "http://localhost:8080/v1"
  llama_cpp_api_key: "not-needed"

searxng:
  url: "http://localhost:8888"

scraping:
  timeout: 15
  max_content_length: 8000

agent:
  max_steps: 20

db:
  path: "~/.local/share/deep_research/research.db"

web:
  host: "0.0.0.0"
  port: 8000

kb:
  # PostgreSQL (build order step 5) — see docker-compose.yml for the local
  # postgres service this default DSN matches. Chat sessions stay on SQLite
  # (see `db` above); this is deliberately separate.
  postgres_dsn: "postgresql://deep_research:deep_research@localhost:5432/deep_research_kb"
  snapshot_dir: "~/.local/share/deep_research/kb_snapshots"
  # Extraction/embeddings use their own models, independent of the `llm` section above.
  extraction_llm_base_url: "http://localhost:8080/v1"  # llama.cpp llama-server
  extraction_llm_model: ""  # empty = auto-detect whichever model llama.cpp has loaded
  # Optional separate verifier; leave unset to reuse extraction above.
  verification_llm_base_url: null
  verification_llm_model: ""
  embedding_base_url: "http://localhost:11434"  # Ollama
  embedding_model: "nomic-embed-text:v1.5"
  claim_duplicate_threshold: 0.85
  # Verification budget (build order step 6) — bounds cost per claim.
  verification_max_web_searches: 2
  verification_run_max_web_searches: 50
  verification_max_sources_examined: 3
  verification_importance_threshold: 0.8
  # Report generation auto-detects the server's real context window via
  # llama.cpp's /slots endpoint and batches (map-reduce) whatever doesn't fit
  # in one pass. This fallback only applies if that detection fails.
  report_context_fallback_tokens: 4096
  # Unattended playlist work is deliberately capped so it cannot consume a whole night.
  playlist_max_videos_per_run: 3
