llm:
  base_url: "http://localhost:11434/v1"  # Ollama default; for llama.cpp use http://host:8080/v1
  model: "llama3"
  api_key: "ollama"  # Ollama ignores this but the API requires it

searxng:
  url: "http://localhost:8888"

scraping:
  timeout: 15
  max_content_length: 8000

agent:
  max_steps: 20

db:
  path: "~/.local/share/deep_research/research.db"

web:
  host: "0.0.0.0"
  port: 8000

kb:
  db_path: "~/.local/share/deep_research/kb.db"
  snapshot_dir: "~/.local/share/deep_research/kb_snapshots"
  # Extraction/embeddings use their own models, independent of the `llm` section above.
  extraction_llm_base_url: "http://localhost:8080/v1"  # llama.cpp llama-server
  extraction_llm_model: ""  # empty = auto-detect whichever model llama.cpp has loaded
  embedding_base_url: "http://localhost:11434"  # Ollama
  embedding_model: "nomic-embed-text:v1.5"
  claim_duplicate_threshold: 0.85
